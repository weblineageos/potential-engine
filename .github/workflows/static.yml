# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LineageOS Launcher</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
<style>
  :root{ --w: 100vw; --h: 100dvh; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ height:100%; background:#000; font-family:'Roboto',sans-serif;
    overflow:hidden; }

  .phone{ width:100vw; height:100vh; height:100dvh; position:fixed; inset:0; overflow:hidden;
    background:#000; }

  /* ---------- STATUS BAR ---------- */
  .statusbar{ position:absolute; top:0; left:0; right:0; height:28px; z-index:20;
    display:flex; align-items:center; justify-content:space-between; padding:0 16px;
    font-size:12px; color:#fff; font-weight:500; letter-spacing:.2px; }
  .statusbar .icons{ display:flex; gap:6px; align-items:center; }
  .statusbar svg{ width:15px; height:15px; fill:#fff; display:block; }
  .statusbar .batt-pct{ font-size:11px; margin-left:1px; }
  .statusbar-hit{ position:absolute; top:0; left:0; right:0; height:30px; z-index:25; }

  /* ---------- HOME SCREEN ---------- */
  .home{ position:absolute; inset:0; overflow:hidden; transition: filter .3s ease; }
  .home.dimmed{ filter: brightness(.55) blur(1.5px); }
  .home .wallpaper{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  .clockblock{ position:absolute; top:64px; left:26px; z-index:2; color:#fff; }
  .clockblock .time{ font-size:52px; font-weight:300; letter-spacing:-2px; line-height:1; text-shadow:0 1px 6px rgba(0,0,0,.3); font-variant-numeric: tabular-nums; }
  .clockblock .date{ margin-top:9px; font-size:12px; font-weight:500; letter-spacing:2.5px; color:#f1cfc7; text-shadow:0 1px 4px rgba(0,0,0,.3); }

  .dock-wrap{ position:absolute; bottom:66px; left:0; right:0; z-index:2; }
  .dock{ display:flex; justify-content:center; align-items:center; }
  .dock .icon{ width:42px; height:42px; margin:0 7px; }

  /* ---------- CLASSIC 3-BUTTON NAV BAR (transparent overlay style) ---------- */
  .navbar{ position:absolute; left:0; right:0; bottom:14px; height:36px; z-index:50;
    pointer-events:none; }
  .navbar .nb{ position:absolute; top:0; width:56px; height:36px; display:flex; align-items:center; justify-content:center;
    pointer-events:auto; }
  #navBack{ left:16.6%; transform:translateX(-50%); }
  #navHome{ left:50%; transform:translateX(-50%); }
  #navRecent{ left:83.4%; transform:translateX(-50%); }
  .navbar svg{ display:block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
  .navbar .back{ width:16px; height:16px; fill:#fff; }
  .navbar .home{ width:15px; height:15px; fill:#fff; }
  .navbar .recent{ width:15px; height:15px; fill:#fff; }

  /* ---------- APP DRAWER ---------- */
  .drawer{ position:absolute; inset:0; background:rgba(12,13,15,0.97); z-index:8;
    transform:translateY(100%); display:flex; flex-direction:column; padding-top:14px; }
  .drawer.dragging{ transition:none; }
  .drawer.animate{ transition:transform .32s cubic-bezier(.2,.8,.3,1); }
  .drawer-handle{ width:36px; height:4px; border-radius:3px; background:rgba(255,255,255,.3); margin:6px auto 10px; }

  .search-bar{ display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.09); border-radius:22px;
    margin:0 16px 14px 16px; padding:9px 14px; color:rgba(255,255,255,0.85); font-size:13px; }
  .search-bar svg{ width:16px; height:16px; opacity:.7; fill:none; stroke:rgba(255,255,255,.7); flex-shrink:0; }
  .search-bar input{ background:none; border:none; outline:none; color:#fff; font-size:13px; font-family:inherit; flex:1; min-width:0; }
  .search-bar input::placeholder{ color:rgba(255,255,255,0.45); }

  .drawer-body{ flex:1; display:flex; overflow:hidden; }
  .app-grid{ flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(4,1fr);
    row-gap:16px; column-gap:2px; padding:2px 6px 46px 12px; align-content:start; }
  .app-grid::-webkit-scrollbar{ width:0; }
  .app-item{ display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
    transition:opacity .15s ease; }
  .app-item.hide{ display:none; }
  .app-item .label{ font-size:10.5px; color:rgba(255,255,255,0.92); max-width:56px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .icon{ width:46px; height:46px; border-radius:50%; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.35); flex-shrink:0;
    transition: transform .12s ease; }
  .icon.pressed{ transform:scale(.86); }
  .icon img{ width:100%; height:100%; display:block; object-fit:cover; pointer-events:none; }

  .az-index{ width:16px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1px; padding:4px 0 30px 0; }
  .az-index span{ font-size:8.5px; color:rgba(255,255,255,0.4); line-height:1.35; cursor:pointer; }
  .az-index span:active, .az-index span.active{ color:#8fd6cf; }

  .no-results{ grid-column:1/-1; text-align:center; color:rgba(255,255,255,0.4); font-size:12px; padding:40px 0; display:none; }

  /* ---------- NOTIFICATION SHADE ---------- */
  .shade{ position:absolute; top:0; left:0; right:0; z-index:30;
    background:rgba(18,19,22,0.97);
    transform:translateY(-100%);
    display:flex; flex-direction:column;
    padding: 30px 16px 16px 16px;
    backdrop-filter:blur(8px);
    border-radius: 0 0 20px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.45);
  }
  .shade.dragging{ transition:none; }
  .shade.animate{ transition:transform .32s cubic-bezier(.2,.8,.3,1); }

  .shade-top{ display:flex; justify-content:space-between; align-items:flex-start; color:#fff; margin-bottom:18px;}
  .shade-time{ font-size:32px; font-weight:300; font-variant-numeric: tabular-nums; }
  .shade-date{ font-size:12px; color:#9aa0a6; margin-top:4px;}
  .shade-settings{ width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; }
  .shade-settings svg{ width:17px; height:17px; fill:#c9ccd1; }

  .quick-toggles{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .qt{ display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; }
  .qt .qt-circle{ width:44px; height:44px; border-radius:50%; background:#2c8c84; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .qt.off .qt-circle{ background:rgba(255,255,255,0.12); }
  .qt svg{ width:22px; height:22px; fill:#fff; }
  .qt.off svg{ fill:#c9ccd1; }
  .qt .qt-label{ font-size:9.5px; color:#c9ccd1; }

  .brightness{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .brightness svg{ width:18px; height:18px; fill:#c9ccd1; flex-shrink:0; }
  .brightness .track{ flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); position:relative; }
  .brightness .fill{ position:absolute; left:0; top:0; bottom:0; width:65%; border-radius:2px; background:#8fd6cf; }
  .brightness .thumb{ position:absolute; left:65%; top:50%; transform:translate(-50%,-50%); width:14px; height:14px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.4); }

  .notif-card{ background:rgba(255,255,255,0.06); border-radius:14px; padding:12px 14px; display:flex; gap:12px; align-items:flex-start; margin-bottom:9px;}
  .notif-icon{ width:28px; height:28px; border-radius:50%; background:#2c8c84; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .notif-icon svg{ width:15px; height:15px; fill:#fff; }
  .notif-text .t1{ font-size:12.5px; color:#fff; font-weight:500; margin-bottom:2px; }
  .notif-text .t2{ font-size:11.5px; color:#9aa0a6; }
  .notif-text .t3{ font-size:10px; color:#6b7075; margin-top:3px; }

</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- ===================== HOME SCREEN ===================== -->
  <div class="home" id="home">
    <img class="wallpaper" src="data:image/png;base64,
on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
